<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bosh sahifa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span>📚</span>
                <span>Ingliz tili</span>
            </div>

            <ul class="nav-links">
                <li><a href="index.html"><span>🏠</span> Bosh sahifa</a></li>
                <li><a href="gramatika.html"><span>📚</span> Gramatika</a></li>
                <li><a href="contakt.html"><span>📞</span> Kontakt</a></li>
            </ul>
        </div>
    </nav>
    <section class="vocabulary-section" id="login">
        <h2>🔐 Hisobingizga kiring</h2>
        <p>Saytga kiring yoki yangi hisob yarating</p>

        <div class="login-container">
            <!-- Login Form -->
            <div class="login-form-card">
                <div class="form-tabs">
                    <button class="tab-btn active" data-tab="login">📝 Kirish</button>
                    <button class="tab-btn" data-tab="signup">🆕 Ro'yxatdan o'tish</button>
                </div>

                <!-- LOGIN FORM -->
                <div id="loginForm" class="tab-content active">
                    <h3>Hisobingizga kiring</h3>
                    <form id="loginUserForm">
                        <div class="form-group">
                            <label>👤 Username yoki Email</label>
                            <input type="text" id="loginUsername" placeholder="username@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>🔒 Parol</label>
                            <input type="password" id="loginPassword" placeholder="Parolingiz" required>
                            <span class="password-toggle" onclick="togglePassword('loginPassword')">👁️</span>
                        </div>
                        <div class="form-options">
                            <label><input type="checkbox" id="rememberMe"> Eslab qol</label>
                            <a href="#" id="forgotPassword">Parolni unutdingizmi?</a>
                        </div>
                        <button type="submit" class="submit-btn">🚪 Kirish</button>
                    </form>
                    <div id="loginMessage" class="form-message"></div>
                </div>

                <!-- SIGNUP FORM -->
                <div id="signupForm" class="tab-content">
                    <h3>Yangi hisob yarating</h3>
                    <form id="signupUserForm">
                        <div class="form-group">
                            <label>👤 To'liq ism</label>
                            <input type="text" id="signupName" placeholder="Ismingiz" required>
                        </div>
                        <div class="form-group">
                            <label>📧 Email</label>
                            <input type="email" id="signupEmail" placeholder="email@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>👤 Username</label>
                            <input type="text" id="signupUsername" placeholder="username" required>
                        </div>
                        <div class="form-group">
                            <label>🔒 Parol</label>
                            <input type="password" id="signupPassword" placeholder="Parol (kamida 6 belgi)" required>
                        </div>
                        <div class="form-group">
                            <label>🔒 Parolni takrorlang</label>
                            <input type="password" id="signupConfirmPassword" placeholder="Parolni qayta kiriting"
                                required>
                        </div>
                        <button type="submit" class="submit-btn">✅ Ro'yxatdan o'tish</button>
                    </form>
                    <div id="signupMessage" class="form-message"></div>
                </div>
            </div>

            <!-- User Info Card (Login bo'lgandan keyin) -->
            <div class="user-info-card" id="userInfoCard" style="display: none;">
                <div class="user-avatar">👤</div>
                <h3 id="userDisplayName">User</h3>
                <p id="userDisplayEmail">user@example.com</p>
                <div class="user-stats">
                    <div class="stat">
                        <span class="stat-number" id="userProgress">0</span>
                        <span class="stat-label">Test topshirilgan</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="userCorrect">0</span>
                        <span class="stat-label">To'g'ri javob</span>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">🚪 Chiqish</button>
            </div>
        </div>
    </section>
</body>

</html>
