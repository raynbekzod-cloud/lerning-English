<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Зачем английский</title>
    <link rel="stylesheet" href="nima uchun.css">
</head>
<body>

<div class="app">

    <!-- top -->
    <div class="top">
        <span class="back">←</span>
        <div class="progress">
            <div class="bar"></div>
        </div>
    </div>

    <h1>Зачем вам нужен английский?</h1>

    <!-- list -->
    <div class="list">

        <label class="item">
            <div class="left">
                <span class="icon">💼</span>
                <p>Карьера и работа</p>
            </div>
            <input type="radio" name="reason">
            <span class="radio"></span>
        </label>

        <label class="item">
            <div class="left">
                <span class="icon">👨‍👩‍👧</span>
                <p>Семья и друзья</p>
            </div>
            <input type="radio" name="reason">
            <span class="radio"></span>
        </label>

        <label class="item">
            <div class="left">
                <span class="icon">✈️</span>
                <p>Путешествия</p>
            </div>
            <input type="radio" name="reason">
            <span class="radio"></span>
        </label>

        <label class="item">
            <div class="left">
                <span class="icon">💬</span>
                <p>Общение с партнёром</p>
            </div>
            <input type="radio" name="reason">
            <span class="radio"></span>
        </label>

        <label class="item">
            <div class="left">
                <span class="icon">🧠</span>
                <p>Тренировка ума</p>
            </div>
            <input type="radio" name="reason">
            <span class="radio"></span>
        </label>

    </div>

    <input type="checkbox" id="modal" class="modal">

    <label for="modal" class="open-btn">Далее</label>

    <label for="modal" class="overlay"></label>

    <div class="modal-content">

        <p class="top-text">
            ДЛЯ ПРОГРЕССА, ПОЖАЛУЙСТА, УТОЧНИТЕ
        </p>

        <h2>
            Какую цель по практике вы <br>
            ставите на день?
        </h2>

        <div class="buttons">

            <input type="radio" name="time" id="btn1">
            <a  href="tens.html" class="time-btn">
                5 мин/день
            </a>

            <input type="radio" name="time" id="btn2">
            <a href="tens.html" class="time-btn">
                10 мин/день
            </a>

            <input type="radio" name="time" id="btn3">
            <a href="tens.html"class="time-btn">
                15 мин/день
            </a>

        </div>

    </div>


</div>

</body>
</html>
