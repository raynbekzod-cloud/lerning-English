<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ingliz tili | Bosh sahifa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="vocabulary-section">
        <h2>Hisobingizga kiring</h2>
        <p>Saytga kiring yoki yangi hisob yarating</p>

        <div class="login-container">
            <div class="login-form-card">
                <div class="form-tabs">
                    <button class="tab-btn active" data-tab="login"> Kirish</button>
                    <button class="tab-btn" data-tab="signup"> Ro'yxatdan o'tish</button>
                </div>

                <!-- LOGIN FORM -->
                <div id="loginForm" class="tab-content active">
                    <h3>Hisobingizga kiring</h3>
                    <form action="#">
                        <div class="form-group">
                            <label>Telefon raqam</label>
                            <input type="tel" id="loginPhone" placeholder="+998 90 123 45 67" required>
                        </div>
                        <div class="form-group">
                            <label> Parol</label>
                            <input type="password" id="loginPassword" placeholder="Parolingiz" required>
                        </div>
                        <a href="./getinfo.html">
                            <button type="button" class="submit-btn"> Kirish</button>
                        </a>
                    </form>
                    <div id="loginMsg" class="form-message"></div>
                </div>

                <!-- SIGNUP FORM -->
                <div id="signupForm" class="tab-content">
                    <h3>Yangi hisob yarating</h3>
                    <form id="signupFormElement">
                        <div class="form-group">
                            <label>To'liq ism</label>
                            <input type="text" id="signupName" placeholder="Ismingiz" required>
                        </div>
                        <div class="form-group">
                            <label>Telefon raqam</label>
                            <input type="tel" id="signupPhone" placeholder="+998 90 123 45 67" required>
                        </div>
                        <div class="form-group">
                            <label>Parol</label>
                            <input type="password" id="signupPassword" placeholder="Parol (kamida 6 belgi)" required>
                        </div>
                        <div class="form-group">
                            <label>Parolni takrorlang</label>
                            <input type="password" id="signupConfirmPassword" placeholder="Parolni qayta kiriting"
                                required>
                        </div>
                        <button type="submit" class="submit-btn">Ro'yxatdan o'tish</button>
                    </form>
                    <div id="signupMsg" class="form-message"></div>
                </div>
            </div>

            <!-- User Info Card -->
            <div class="user-info-card" id="userInfoCard" style="display: none;">
                <h3 id="userDisplayName">User</h3>
                <p id="userDisplayPhone">+998 xx xxx xx xx</p>
                <div class="user-stats">
                    <div class="stat">
                        <span class="stat-number" id="userProgress">0</span>
                        <span class="stat-label">Test topshirilgan</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="userCorrect">0</span>
                        <span class="stat-label">To'g'ri javob</span>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn"> Chiqish</button>
            </div>
        </div>
    </section>

    <script>
        // Mobil menyu
        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');
        if (menuBtn && navLinks) {
            menuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('show');
            });
        }

        // Tab o'zgartirish
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + 'Form').classList.add('active');
            });
        });
    </script>
</body>

</html>
